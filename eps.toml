[package]
name        = "hookplayer"
version     = "0.2.0"
description = "Plays sounds in response to Claude Code hook events"
authors     = ["nickagliano"]
license     = "MIT"
repository  = "https://github.com/nickagliano/hookplayer"
platform    = ["aarch64-apple-darwin", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu"]

[eps]
customization_guide = "CUSTOMIZE.md"

[hooks]
install = "install.sh"
